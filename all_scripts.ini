11\Command="
    copyq:
    (function() {
        // --- HELPER: Output & Replace ---
        function outputResult(finalString) {
            var row = currentItem();
            
            if (row >= 0) {
                // If an item is selected in the GUI, replace it in place
                remove(row);
                insert(row, finalString);
                select(row); // Keep the newly processed item selected
            } else {
                // Fallback: If executed globally with no selection, add to top
                add(finalString);
            }
            
            // Always update the active system clipboards too
            copy(finalString);
            copySelection(finalString);
        }

        // Step 1: Get content. 
        // Prioritize the data of the currently selected item, fallback to the global clipboard
        var itemData = data(\"text/plain\");
        const contents = itemData ? str(itemData) : str(clipboard());

        if (!contents || !contents.trim()) {
            abort(\"Selection is empty or contains only whitespace.\");
        }

        const lines = contents.split('\\n');
        if (lines.length <= 1) {
            abort(\"Only one line found, nothing to process.\");
        }

        // Helper to check for content (used by validations and Mode 1)
        const nonEmptyLines = lines.filter(line => line.trim().length > 0);
        if (nonEmptyLines.length === 0) {
            abort(\"Selection contains only empty lines.\");
        }

        // ========================================================================
        // MODE 1: Quoted Multiline Strings
        // ========================================================================
        let quotedLinesCount = 0;
        const quoteRegex = /^\\s*([\"'])(.*)\\1\\s*$/;

        for (let line of nonEmptyLines) {
            if (quoteRegex.test(line)) {
                quotedLinesCount++;
            }
        }

        if ((quotedLinesCount / nonEmptyLines.length) >= 0.6) {
            const cleanedLines = nonEmptyLines.map(line => {
                let match = line.match(quoteRegex);
                return match ? match[2].trim() : line.trim();
            });

            const finalString = cleanedLines.join(' ').replace(/\\s{2,}/g, ' ');

            outputResult(finalString);
            return;
        }

        // ========================================================================
        // MODE 2: REPL / Console Output with Prefixes (Code mode)
        // ========================================================================
        const replRegex = /^(?:\\.\\.\\.: ?|>>> ?|> ?|In \\[\\d+\\]: |\\.\\.\\. ?)/;
        const contRegex = /^\\s*[⋮┊]\\s*/; 

        const hasRepl = lines.some(line => replRegex.test(line));
        const hasCont = lines.some(line => contRegex.test(line));

        if (hasRepl || hasCont) {
            let processedLines = [];
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                let contMatch = line.match(contRegex);
                if (contMatch) {
                    let contentToAppend = line.replace(contRegex, '');
                    if (processedLines.length > 0) {
                        processedLines[processedLines.length - 1] += contentToAppend;
                    } else {
                        processedLines.push(contentToAppend);
                    }
                    continue;
                }

                if (replRegex.test(line)) {
                    processedLines.push(line.replace(replRegex, ''));
                } else {
                    processedLines.push(line); 
                }
            }

            const finalString = processedLines.join('\\n');
            
            outputResult(finalString);
            return;
        }

        // ========================================================================
        // MODE 3: Generic Line Unwrap (Smart Paragraphs / Terminal Text)
        // ========================================================================
        // Strips common terminal characters (›, ❯, >, $, %, etc.) at the start of a line
        const promptRegex = /^[›❯>$%]\\s+/;

        let resultChunks = [];
        let currentParagraphLines = [];

        for (let i = 0; i < lines.length; i++) {
            // Strip trailing carriage return first (handles Windows \\r\\n formats cleanly)
            let strippedLine = lines[i].replace(/\\r$/, ''); 
            let trimmedLine = strippedLine.trim();

            if (trimmedLine === '') {
                // We hit a break line (either totally empty, or full of spaces)
                if (currentParagraphLines.length > 0) {
                    // Flush the current paragraph text
                    let paraText = currentParagraphLines.join(' ').replace(/\\s{2,}/g, ' ');
                    resultChunks.push(paraText);
                    currentParagraphLines = [];
                }
                
                // Check original length to determine formatting rule
                if (strippedLine.length === 0) {
                    // Truly empty line -> Single newline (\\n)
                    resultChunks.push('\\n');
                } else {
                    // Line populated by invisible spaces (terminal padding) -> Double newline (\\n\\n)
                    resultChunks.push('\\n\\n');
                }
            } else {
                // Normal text line: remove prompt characters and add to buffer
                let cleanLine = trimmedLine.replace(promptRegex, '');
                currentParagraphLines.push(cleanLine);
            }
        }

        // Flush any remaining text at the end of the loop
        if (currentParagraphLines.length > 0) {
            let paraText = currentParagraphLines.join(' ').replace(/\\s{2,}/g, ' ');
            resultChunks.push(paraText);
        }

        // Join everything together, cap sequential newlines at 2, and trim the absolute edges
        const finalString = resultChunks.join('')
            .replace(/\\n{3,}/g, '\\n\\n')
            .trim();
            
        outputResult(finalString);
    })();"
