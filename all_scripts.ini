2\Command="
    copyq:
    var queueTab = \"&Queue\";

    // Python script that uses the Linux evdev API to read all active keys,
    // release them, inject Shift+Insert, and restore ONLY the modifiers.
    var pyScript = `
    import evdev
    import time
    import sys

    MOD_KEYS = {
        evdev.ecodes.KEY_LEFTSHIFT, evdev.ecodes.KEY_RIGHTSHIFT,
        evdev.ecodes.KEY_LEFTCTRL, evdev.ecodes.KEY_RIGHTCTRL,
        evdev.ecodes.KEY_LEFTALT, evdev.ecodes.KEY_RIGHTALT,
        evdev.ecodes.KEY_LEFTMETA, evdev.ecodes.KEY_RIGHTMETA
    }

    try:
        devices = [evdev.InputDevice(path) for path in evdev.list_devices()]
    except Exception:
        sys.exit(1)

    keyboards = []
    active_mods = []
    all_active_keys = []

    # Find all keyboards and any currently pressed keys
    for d in devices:
        caps = d.capabilities()
        if evdev.ecodes.EV_KEY in caps:
            keys = caps[evdev.ecodes.EV_KEY]
            # Identify devices that actually have Shift and Insert keys
            if isinstance(keys, list) and evdev.ecodes.KEY_INSERT in keys and evdev.ecodes.KEY_LEFTSHIFT in keys:
                keyboards.append(d)
            try:
                active = d.active_keys()
                for k in active:
                    all_active_keys.append((d, k)) # Track ALL pressed keys
                    if k in MOD_KEYS:
                        active_mods.append((d, k)) # Track ONLY modifiers for later restoration
            except Exception:
                pass

    # 1. Release ALL currently pressed keys physically
    for d, k in all_active_keys:
        try:
            d.write(evdev.ecodes.EV_KEY, k, 0)
        except Exception:
            pass

    # 2. Inject Shift+Insert using the first available physical keyboard
    if keyboards:
        kb = keyboards[0]
        kb.write(evdev.ecodes.EV_KEY, evdev.ecodes.KEY_LEFTSHIFT, 1)
        kb.write(evdev.ecodes.EV_KEY, evdev.ecodes.KEY_INSERT, 1)
        kb.write(evdev.ecodes.EV_KEY, evdev.ecodes.KEY_INSERT, 0)
        kb.write(evdev.ecodes.EV_KEY, evdev.ecodes.KEY_LEFTSHIFT, 0)
        kb.syn() 

    # 3. Restore previously pressed modifiers ONLY
    for d, k in active_mods:
        try:
            d.write(evdev.ecodes.EV_KEY, k, 1)
            d.syn() 
        except Exception:
            pass

    time.sleep(0.01)
    `;

    fastPaste = function () {
        var x = execute('python3', '-c', pyScript);
        if (!x) popup('Failed to run python3');
        if (x.stderr) popup('Failed to run python3', str(x.stderr));
    }

    // ATOMIC RAM LOCK FUNCTIONS:
    function acquireLock() {
        // Try exactly ONCE. If the directory already exists, it fails and returns false.
        var res = execute('mkdir', '/tmp/copyq_queue_lock');
        return (res && res.exit_code === 0);
    }

    function releaseLock() {
        execute('rmdir', '/tmp/copyq_queue_lock');
    }

    // MAIN LOGIC:
    if (acquireLock()) {
        try {
            var allTabs = tab();

            if (allTabs.indexOf(queueTab) !== -1) {
                tab(queueTab);

                if (size() > 0) {
                    // Put the top item into the system clipboard natively
                    select(0);

                    // Remove the item from the queue
                    remove(0);

                    var tabIsEmpty = (size() == 0);

                    // If empty, remove the tab BEFORE blocking the script
                    if (tabIsEmpty) {
                        removeTab(queueTab);
                    }

                    // Fire the python evdev injection sequence
                    fastPaste();

                    // Universal safety buffer to allow the target app to consume the clipboard 
                    // before the lock is released. Tweak this up or down as needed.
                    sleep(5); 
                }
            }
        } finally {
            // ALWAYS release the lock from RAM so the next keypress works
            releaseLock();
        }
    }"
