[Commands]
1\Command="
    copyq:
    var queueTab = \"&Queue\";
    var selectedIndices = selectedItems(); 

    if (selectedIndices.length > 0) {
        // 1. Grab all items from the current tab
        var allItems = ItemSelection().selectAll().items();
        var itemsToQueue = [];
        
        // Sort descending so the oldest item (highest row number) goes first
        selectedIndices.sort(function(a, b) { return a - b; });

        // Retrieve the actual data objects for the selected items
        for (var i = 0; i < selectedIndices.length; ++i) {
            var row = selectedIndices[i];
            itemsToQueue.push(allItems[row]);
        }

        // 2. Dynamically prepare the hidden queue tab
        var originalTab = tab(); // Remember where we came from
        
        // Check if the tab exists by attempting to switch to it.
        // If it fails, create it.
        try {
            tab(queueTab);
        } catch(e) {
            // Tab doesn't exist, create it
            addTab(queueTab);
            tab(queueTab);
        }

        // 3. Clear existing items in the queue tab safely (if it existed)
        var currentCount = count();
        for (var i = currentCount - 1; i >= 0; --i) {
            remove(i);
        }

        // 4. Insert new items into the queue tab
        for (var i = itemsToQueue.length - 1; i >= 0; --i) {
            add(itemsToQueue[i]);
        }

        // 5. Switch back to your normal tab
        tab(originalTab);

        popup(\"Queue ready!\", selectedIndices.length + \" items queued.\\nPress Ctrl+V (or your Paste global shortcut) sequentially.\");
    } else {
        popup(\"Error\", \"No items selected!\");
    }"
1\Icon=
1\InMenu=true
1\Name=Prepare Paste Queue
size=1
