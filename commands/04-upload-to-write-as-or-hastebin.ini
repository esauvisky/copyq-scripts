1\Command="
    /**
     * Uploads the current item as Markdown to write.as.
     */
    global.uploadMarkdown = function() {
        const row = currentItem();

        const existingLink = findExistingLink(getTags(row));
        if (existingLink) {
            const link = existingLink.replace(/^(Markdown|Hastebin): /, \"\");
            copy(link);
            popup(\"Already uploaded\", \"Existing link copied to clipboard:\\n\" + link, 4000);
            return;
        }

        const itemText = getItemText(row);
        if (!itemText.trim()) {
            popup(\"Nothing to upload\", \"The selected item is empty.\", 4000);
            return;
        }

        popup(\"Uploading…\", \"Sending \" + itemText.length + \" characters to write.as\", 2000);

        const link = postMarkdown(itemText);
        updateTagAndCopyLink(row, link, \"Markdown: \");

        popup(\"Markdown uploaded ✓\", link + \"\\n\\nLink copied to clipboard and tagged.\", 5000);
    };

    /**
     * Uploads the current item as code to haste.zneix.eu.
     */
    global.uploadCode = function() {
        const row = currentItem();

        const existingLink = findExistingLink(getTags(row));
        if (existingLink) {
            const link = existingLink.replace(/^(Markdown|Hastebin): /, \"\");
            copy(link);
            popup(\"Already uploaded\", \"Existing link copied to clipboard:\\n\" + link, 4000);
            return;
        }

        const itemText = getItemText(row);
        if (!itemText.trim()) {
            popup(\"Nothing to upload\", \"The selected item is empty.\", 4000);
            return;
        }

        popup(\"Uploading…\", \"Sending \" + itemText.length + \" characters to haste.zneix.eu\", 2000);

        const link = postCode(itemText);
        updateTagAndCopyLink(row, link, \"Hastebin: \");

        popup(\"Code uploaded ✓\", link + \"\\n\\nLink copied to clipboard and tagged.\", 5000);
    };

    // ---------- helpers ----------

    function getTags(row) {
        return str(read(\"application/x-copyq-tags\", row)).split(\",\")
               .map(tag => tag.trim());
    }

    function findExistingLink(tags) {
        return tags.find(tag => tag.startsWith(\"Markdown: \") || tag.startsWith(\"Hastebin: \"));
    }

    function getItemText(row) {
        return str(read(row));
    }

    function runCurl(serviceName, args, stdinData) {
        // Arguments after `null` are sent to the command's stdin
        const response = execute(\"curl\", \"-sS\", ...args, null, stdinData);

        if (!response) {
            popup(\"Upload failed ✗\", \"Could not execute curl. Is it installed?\", 6000);
            abort();
        }
        if (response.exit_code !== 0) {
            popup(\"Upload failed ✗\",
                  serviceName + \" request failed (curl exit code \" + response.exit_code + \"):\\n\"
                  + str(response.stderr), 6000);
            abort();
        }
        return str(response.stdout);
    }

    function parseJsonOrAbort(serviceName, stdout) {
        try {
            return JSON.parse(stdout);
        } catch (e) {
            popup(\"Upload failed ✗\",
                  serviceName + \" returned an invalid response:\\n\" + stdout.slice(0, 500), 6000);
            abort();
        }
    }

    function postMarkdown(bodyText) {
        const endpoint = \"https://write.as/api/posts\";
        const postData = JSON.stringify({ body: bodyText });

        const stdout = runCurl(\"write.as\", [
            \"-X\", \"POST\", endpoint,
            \"-H\", \"Content-Type: application/json\",
            \"--data-binary\", \"@-\"
        ], postData);

        const parsed = parseJsonOrAbort(\"write.as\", stdout);

        // WriteFreely returns { code: 201, data: { id, token, ... } } — no `url` field
        if (parsed.code !== 201 || !parsed.data || !parsed.data.id) {
            popup(\"Upload failed ✗\",
                  \"write.as rejected the post (HTTP \" + parsed.code + \"):\\n\"
                  + (parsed.error_msg || stdout.slice(0, 500)), 6000);
            abort();
        }

        return \"https://write.as/\" + parsed.data.id + \".md\";
    }

    function postCode(bodyText) {
        const endpoint = \"https://haste.zneix.eu/documents\";

        const stdout = runCurl(\"haste.zneix.eu\", [
            \"-X\", \"POST\", endpoint,
            \"-H\", \"User-Agent: haste-client/1.2\",
            \"--data-binary\", \"@-\"
        ], bodyText);

        const parsed = parseJsonOrAbort(\"haste.zneix.eu\", stdout);

        if (!parsed.key) {
            popup(\"Upload failed ✗\",
                  \"haste.zneix.eu did not return a key:\\n\" + stdout.slice(0, 500), 6000);
            abort();
        }

        return \"https://haste.zneix.eu/\" + parsed.key;
    }

    function updateTagAndCopyLink(row, link, prefix) {
        const tagData = prefix + link;
        const currentData = str(read(\"application/x-copyq-tags\", row));
        setData(\"application/x-copyq-tags\", currentData ? `${tagData},${currentData}` : tagData, row);
        copy(link);
    }"
