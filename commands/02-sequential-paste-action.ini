1\Command="
    /*
     * SEQUENTIAL PASTE - ULTIMATE PROFILER & QUEUE MANAGER
     */

    // Find this with `ls dev/input/by-id/`
    const PREFERRED_KEYBOARD = \"/dev/input/by-id/usb-BY_Tech_Gaming_Keyboard-event-kbd\"

    global.sequentialPaste = function () {
        var queueTab = \"&Queue\";
        var jsLog = [];
        var tStart = new Date().getTime();
        var lastTime = tStart;

        function trackJS(step) {
            var now = new Date().getTime();
            jsLog.push(\"JS | +\" + (now - lastTime) + \"ms | \" + step);
            lastTime = now;
        }

        function acquireLock() {
            var res = execute('mkdir', '/tmp/copyq_queue_lock');
            return (res && res.exit_code === 0);
        }

        function releaseLock() {
            execute('rmdir', '/tmp/copyq_queue_lock');
        }

        function setCooldown() {
            execute('sh', '-c', 'echo ' + new Date().getTime() + ' > /tmp/copyq_queue_cooldown');
        }

        function isCooldown() {
            var res = execute('cat', '/tmp/copyq_queue_cooldown');
            if (res && res.exit_code === 0) {
                var fileTime = parseInt(str(res.stdout).trim(), 10);
                if (!isNaN(fileTime) && (new Date().getTime() - fileTime < 2000)) {
                    return true;
                }
            }
            return false;
        }

        function getPyScript(queueHasItems) {
            var injectKeys = queueHasItems 
                ? \"evdev.ecodes.KEY_LEFTCTRL, evdev.ecodes.KEY_V\"
                : \"evdev.ecodes.KEY_LEFTSHIFT, evdev.ecodes.KEY_INSERT\";

    return `
    import time
    t_start = time.time()
    log = []
    PREFERRED_KEYBOARD = \"${PREFERRED_KEYBOARD}\"
    def pt(step):
        global t_start
        now = time.time()
        log.append(f\"PY | +{int((now - t_start)*1000)}ms | {step}\")
        t_start = now

    pt(\"Started Python Script\")

    import sys
    import os
    pt(\"Imported sys & os\")

    import evdev
    pt(\"Imported evdev\")

    MOD_KEYS = {
        evdev.ecodes.KEY_LEFTSHIFT, evdev.ecodes.KEY_RIGHTSHIFT,
        evdev.ecodes.KEY_LEFTCTRL, evdev.ecodes.KEY_RIGHTCTRL,
        evdev.ecodes.KEY_LEFTALT, evdev.ecodes.KEY_RIGHTALT,
        evdev.ecodes.KEY_LEFTMETA, evdev.ecodes.KEY_RIGHTMETA
    }

    if PREFERRED_KEYBOARD:
        paths = [PREFERRED_KEYBOARD]
    else:
        paths = evdev.list_devices()

    devices = []
    for p in paths:
        try: devices.append(evdev.InputDevice(p))
        except Exception: pass

    keyboards = []
    active_mods = []
    all_active_keys = []

    for d in devices:
        caps = d.capabilities()
        if evdev.ecodes.EV_KEY in caps:
            keys = caps[evdev.ecodes.EV_KEY]
            if isinstance(keys, list) and evdev.ecodes.KEY_V in keys:
                keyboards.append(d)
            try:
                active = d.active_keys()
                for k in active:
                    all_active_keys.append((d, k))
                    if k in MOD_KEYS:
                        active_mods.append((d, k))
            except Exception:
                pass

    keys_to_inject = [${injectKeys}]

    if keyboards:
        kb = keyboards[0]
        
        dirty_devs = []
        for d, k in all_active_keys:
            try:
                d.write(evdev.ecodes.EV_KEY, k, 0)
                if d not in dirty_devs: dirty_devs.append(d)
            except: pass
                
        for d in dirty_devs:
            try: d.syn()
            except: pass

        for k in keys_to_inject:
            kb.write(evdev.ecodes.EV_KEY, k, 1)
        kb.syn() 
        
        dirty_devs = [kb]
        for k in reversed(keys_to_inject):
            kb.write(evdev.ecodes.EV_KEY, k, 0)
            
        for d, k in active_mods:
            try:
                d.write(evdev.ecodes.EV_KEY, k, 1)
                if d not in dirty_devs: dirty_devs.append(d)
            except: pass
                
        for d in dirty_devs:
            try: d.syn()
            except: pass

    for d in devices:
        try: d.close()
        except: pass

    sys.exit(0)
    `;
        }

        // ------------------------------------------
        // MAIN EXECUTION LOGIC
        // ------------------------------------------
        var allTabs = tab();
        var hasQueueTab = (allTabs.indexOf(queueTab) !== -1);

        if (!hasQueueTab) {
            if (isCooldown()) {
                setCooldown(); 
                //popup(\"Queue Guard\", \"Spam blocked!\\nNormal pasting will resume 2 seconds after you stop pressing.\");
                return;
            }

            copySelection(clipboard());
            var pyScript = getPyScript(false);
            var x = execute('python3', '-c', pyScript);
            
        } else {
            if (acquireLock()) {
                try {
                    var queueHasItems = false;
                    tab(queueTab);
                    
                    if (size() > 0) {
                        queueHasItems = true;
                        
                        var rmRes = execute('rm', '/tmp/copyq_queue_recording');
                        //if (rmRes && rmRes.exit_code === 0) {
                        //    popup(\"Playback Started\", \"Listen Mode disabled.\\nPasting queue...\");
                        //}
                        
                        // --- FIX FOR COPYQ \"MOVE TO TOP\" BUG ---
                        var oldestIdx = size() - 1;
                        var itemToPaste = getItem(oldestIdx); // 1. Grab the oldest item
                        
                        remove(oldestIdx); // 2. Safely remove it from the bottom
                        add(itemToPaste);  // 3. Force it to Row 0
                        
                        // --- INJECT TO HISTORY ---
                        if (itemToPaste['application/x-copyq-listen-mode'] === 'true') {
                            var isImage = false;
                            var mImg = 'image/png';
                            var mTxt = 'text/plain';
                            
                            if (itemToPaste[mImg]) { isImage = true; }
                            
                            var destTab = isImage ? \"&Images\" : \"&Clipboard\";
                            try { tab(destTab); } catch(e) { addTab(destTab); tab(destTab); }
                            
                            delete itemToPaste['application/x-copyq-listen-mode'];
                            
                            var time = Date.now();
                            var tags = dateString('MM-dd hh:mm:ss');
                            
                            if (!isImage && itemToPaste[mTxt]) {
                                var text = str(itemToPaste[mTxt]);
                                if (typeof removeIfExists === \"function\") removeIfExists(mTxt, text);
                                
                                const numLines = text ? (text.match(/\\n/g) || []).length + 1 : 0;
                                if (numLines > 1) tags = 'Lines: ' + numLines + ',' + tags;
                                
                                if (typeof detectLanguage === \"function\") {
                                    const lang = detectLanguage(text);
                                    if (lang) {
                                        tags = lang + ',' + tags;
                                        if (typeof highlightCode === \"function\") {
                                            var htmlCode = highlightCode(text, lang);
                                            if (htmlCode) itemToPaste['text/html'] = htmlCode;
                                        }
                                    }
                                }
                            } else if (isImage) {
                                if (typeof removeIfExists === \"function\") removeIfExists(mImg, itemToPaste[mImg]);
                            }
                            
                            itemToPaste['application/x-copyq-tags'] = tags;
                            itemToPaste['application/x-copyq-user-copy-time'] = time;
                            itemToPaste['application/x-copyq-output-tab'] = destTab;
                            
                            add(itemToPaste);
                            tab(queueTab);
                        }
                        // -------------------------

                        select(0);         // 4. Send Row 0 to system clipboard
                        remove(0);         // 5. Remove Row 0 from the queue completely
                        // ---------------------------------------
                        
                        if (size() == 0) {
                            removeTab(queueTab);
                            setCooldown();
                            popup(\"✅ Queue Finished!\", \"All the items from the queue were pasted.\", 2000);
                        }
                    }
                } finally {
                    var pyScript = getPyScript(queueHasItems);
                    var x = execute('python3', '-c', pyScript);
                    releaseLock();
                }
            }
        }
    };"
