    /*
     * SEQUENTIAL PASTE - ULTIMATE PROFILER
     * This logs every micro-step to locate the true bottleneck.
     */

    global.sequentialPaste = function () {
        var queueTab = \"&Queue\";
        var jsLog = [];
        var tStart = new Date().getTime();
        var lastTime = tStart;

        function trackJS(step) {
            var now = new Date().getTime();
            jsLog.push(\"JS | +\" + (now - lastTime) + \"ms | \" + step);
            lastTime = now;
        }

        function acquireLock() {
            var res = execute('mkdir', '/tmp/copyq_queue_lock');
            return (res && res.exit_code === 0);
        }

        function releaseLock() {
            execute('rmdir', '/tmp/copyq_queue_lock');
        }

        function getPyScript(queueHasItems) {
            var injectKeys = queueHasItems 
                ? \"evdev.ecodes.KEY_LEFTCTRL, evdev.ecodes.KEY_V\"
                : \"evdev.ecodes.KEY_LEFTSHIFT, evdev.ecodes.KEY_INSERT\";

    // Python string left-aligned
    return `
    import time
    t_start = time.time()
    log = []
    PREFERRED_KEYBOARD = \"/dev/input/by-id/usb-BY_Tech_Gaming_Keyboard-event-kbd\"
    def pt(step):
        global t_start
        now = time.time()
        log.append(f\"PY | +{int((now - t_start)*1000)}ms | {step}\")
        t_start = now

    pt(\"Started Python Script\")

    import sys
    import os
    pt(\"Imported sys & os\")

    import evdev
    pt(\"Imported evdev\")

    MOD_KEYS = {
        evdev.ecodes.KEY_LEFTSHIFT, evdev.ecodes.KEY_RIGHTSHIFT,
        evdev.ecodes.KEY_LEFTCTRL, evdev.ecodes.KEY_RIGHTCTRL,
        evdev.ecodes.KEY_LEFTALT, evdev.ecodes.KEY_RIGHTALT,
        evdev.ecodes.KEY_LEFTMETA, evdev.ecodes.KEY_RIGHTMETA
    }

    if PREFERRED_KEYBOARD:
        paths = [PREFERRED_KEYBOARD]
        pt(f\"Using preferred keyboard: {PREFERRED_KEYBOARD}\")
    else:
        paths = evdev.list_devices()
        pt(f\"list_devices() found {len(paths)} paths\")

    devices = []
    for p in paths:
        try:
            devices.append(evdev.InputDevice(p))
        except Exception:
            pass
    pt(f\"Mapped {len(devices)} InputDevices\")

    keyboards = []
    active_mods = []
    all_active_keys = []

    pt(\"Starting capabilities scan\")
    for d in devices:
        caps = d.capabilities()
        if evdev.ecodes.EV_KEY in caps:
            keys = caps[evdev.ecodes.EV_KEY]
            if isinstance(keys, list) and evdev.ecodes.KEY_V in keys:
                keyboards.append(d)
            try:
                active = d.active_keys()
                for k in active:
                    all_active_keys.append((d, k))
                    if k in MOD_KEYS:
                        active_mods.append((d, k))
            except Exception:
                pass
    pt(f\"Scanned keys (Found {len(all_active_keys)} pressed)\")

    keys_to_inject = [${injectKeys}]

    if keyboards:
        kb = keyboards[0]
        
        pt(\"Phase 1: Release physical keys\")
        dirty_devs = []
        for d, k in all_active_keys:
            try:
                d.write(evdev.ecodes.EV_KEY, k, 0)
                if d not in dirty_devs:
                    dirty_devs.append(d)
            except Exception:
                pass
                
        for d in dirty_devs:
            try: d.syn()
            except Exception: pass
        pt(\"Phase 1 done (Released & Synced)\")

        pt(\"Phase 2: Inject sequence\")
        for k in keys_to_inject:
            kb.write(evdev.ecodes.EV_KEY, k, 1)
        kb.syn() 
        pt(\"Phase 2 done (Sequence Pressed)\")
        
        pt(\"Phase 3: Release sequence & Restore modifiers\")
        dirty_devs = [kb]
        for k in reversed(keys_to_inject):
            kb.write(evdev.ecodes.EV_KEY, k, 0)
            
        for d, k in active_mods:
            try:
                d.write(evdev.ecodes.EV_KEY, k, 1)
                if d not in dirty_devs:
                    dirty_devs.append(d)
            except Exception:
                pass
                
        for d in dirty_devs:
            try: d.syn()
            except Exception: pass
        pt(\"Phase 3 done (Modifiers restored)\")

    pt(\"Closing file descriptors\")
    for d in devices:
        try: d.close()
        except: pass
    pt(\"Closed file descriptors\")

    print(\"\\\\n\".join(log))
    sys.stdout.flush()
    sys.exit(0)
    `;
        }

        // ------------------------------------------
        // MAIN EXECUTION LOGIC
        // ------------------------------------------
        trackJS(\"Script initialized\");

        var allTabs = tab();
        var hasQueueTab = (allTabs.indexOf(queueTab) !== -1);
        trackJS(\"Checked for queue tab\");

        if (!hasQueueTab) {
            trackJS(\"Queue empty/missing. Syncing primary selection natively.\");
            copySelection(clipboard());
            trackJS(\"Primary selection synced.\");
            
            trackJS(\"Starting Python execution...\");
            var pyScript = getPyScript(false);
            var x = execute('python3', '-c', pyScript);
            trackJS(\"Python execution finished.\");
            
            if (x && x.stdout) jsLog.push(str(x.stdout).trim());
            if (x && x.stderr) jsLog.push(\"ERROR: \" + str(x.stderr).trim());
            
        } else {
            trackJS(\"Queue tab found. Attempting lock.\");
            if (acquireLock()) {
                try {
                    trackJS(\"Lock acquired.\");
                    var queueHasItems = false;
                    tab(queueTab);
                    
                    if (size() > 0) {
                        queueHasItems = true;
                        select(0);
                        trackJS(\"Selected queue item 0.\");
                        
                        remove(0);
                        trackJS(\"Removed queue item 0.\");
                        
                        if (size() == 0) {
                            removeTab(queueTab);
                            trackJS(\"Queue empty. Removed tab.\");
                        }
                    }
                } finally {
                    trackJS(\"Executing Python...\");
                    var pyScript = getPyScript(queueHasItems);
                    var x = execute('python3', '-c', pyScript);
                    trackJS(\"Python execution finished.\");
                    
                    if (x && x.stdout) jsLog.push(str(x.stdout).trim());
                    if (x && x.stderr) jsLog.push(\"ERROR: \" + str(x.stderr).trim());
                    
                    releaseLock();
                    trackJS(\"Lock released.\");
                }
            } else {
                trackJS(\"ABORTED: Lock failed.\");
            }
        }

        var totalTime = new Date().getTime() - tStart;
        jsLog.push(\"------------------------\");
        jsLog.push(\"TOTAL TIME: \" + totalTime + \"ms\");
        
        popup(\"Execution Trace\", jsLog.join(\"\\n\"));
    };"
